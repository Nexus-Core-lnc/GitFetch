<div class="container text-center mt-5">
    <div class="card shadow p-5">
        <i class="fab fa-github fa-5x mb-3"></i>
        <h2>Lier votre compte GitHub</h2>
        <p class="text-muted">
            Pour afficher vos projets sur votre portfolio, nous avons besoin d'accéder à vos dépôts publics.
        </p>
        
        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <div class="mt-4">
            <a href="http://127.0.0.1:5001/login/github" class="btn btn-dark btn-lg">
                <i class="fab fa-github"></i> Autoriser GitFetch
            </a>
        </div>
    </div>
</div>
