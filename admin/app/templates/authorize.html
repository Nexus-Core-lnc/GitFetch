
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">Intégrations Externes</h5>
        </div>
        <div class="card-body text-center">
            <p>Pour afficher vos projets GitHub automatiquement, vous devez autoriser l'accès.</p>
            
            {% if current_user.github_access_token %}
                <div class="alert alert-success">
                    <i class="fas fa-check-circle"></i> Votre compte est lié à GitHub.
                </div>
                <a href="{{ url_for('admin.authorize_github') }}" class="btn btn-outline-warning">
                    Mettre à jour l'autorisation
                </a>
            {% else %}
                <a href="{{ url_for('admin.authorize_github') }}" class="btn btn-dark">
                    <i class="fab fa-github"></i> Autoriser l'accès à GitHub
                </a>
            {% endif %}
        </div>
    </div>
</div>
